name: VoiceVoiceDemo
options:
  bundleIdPrefix: com.voicevoice
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  VoiceVoice:
    path: ../

targets:
  VoiceVoiceDemo:
    type: application
    platform: [macOS, iOS]
    sources:
      - VoiceVoiceDemo
    dependencies:
      - package: VoiceVoice
        product: VoiceVoice
      - package: VoiceVoice
        product: VoiceVoiceMLX
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: VoiceVoice Demo
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
